<!DOCTYPE html>
<html>

<head>
    <meta charset = "utf-8">
    <title>Lorenz Simulation</title>
    <link rel = "icon" href = "favicon.ico">
    <link rel = "stylesheet" href = "index.css">
    <script src="https://cdn.plot.ly/plotly-3.6.0.min.js" charset="utf-8"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
</head>
<body>

    <h1>Lorenz Plot</h1>
    <div class = "plot-container">
        <div class = "plot">
            <img src = "LorenzPlotImage.png"/>
            <p>
                The image above shows the midpoint method being implemented to simulate the Lorenz System.
            </p>
        </div>
        <div class = "plot">
            <img src = "LorenzPlotImage2.png"/>
            <p>
                The image above shows the Euler method being implemented.
            </p>
            <!--<button onclick = "eulerButton()">Euler Method</button>-->
        </div>
    </div>
    <div id="plot-euler" style="width:600px;height:250px;"></div>
</body>

<script>
    async function loadCsv(){
        const data = await d3.csv("lorenzdata_euler.csv");
        console.log(data);
        let x = [];
        let y = [];
        let z = [];

        for(const d of data) {
            x.push(d.x);
            y.push(d.y);
            z.push(d.z);
        }
        console.log(x, y, z);

        PLOT = document.getElementById('plot-euler');
        Plotly.newPlot(
            PLOT,
            [{
                x: x,
                y: y,
                z: z,
            }],
            {
                margin: { t: 0 }
            }
        );
    }
    loadCsv();
</script>

<!--<script>
    function eulerButton(){
        console.log("Animate the Euler method");
    }
</script>-->
</html>
